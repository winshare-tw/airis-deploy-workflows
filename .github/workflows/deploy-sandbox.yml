name: deploy-sandbox

on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      port:
        type: number
        required: true
      health_path:
        type: string
        default: "/"
      alias:
        type: string
        default: ""
      zone:
        type: string
        default: "winshare.tw"
      ttl:
        type: string
        default: "7d"
      promote:
        type: boolean
        default: true
      resources_cpu:
        type: string
        default: "500m"
      resources_mem:
        type: string
        default: "512Mi"
      image_registry:
        type: string
        default: "ghcr.io/winshare-tw"
      env_kv:
        type: string
        default: ""
        description: "Newline-separated KEY=VALUE pairs to inject as container env"
    outputs:
      host:
        description: "FQDN of the new sandbox"
        value: ${{ jobs.deploy.outputs.host }}
      instance:
        description: "Instance id (= image tag)"
        value: ${{ jobs.deploy.outputs.instance }}
      latest_host:
        description: "alias.winshare.tw if promoted"
        value: ${{ jobs.deploy.outputs.latest_host }}
    secrets:
      GITOPS_SSH_KEY:
        required: true

env:
  AIRIS_DEPLOY_REF: v1

jobs:
  deploy:
    runs-on: arc-winshare-default
    timeout-minutes: 20
    # NOTE: caller workflow MUST declare:
    #   permissions:
    #     contents: read
    #     packages: write
    # Declaring `permissions:` at this level breaks workflow_call when the
    # caller's defaults are below the requested level (startup_failure with
    # no logs). Caller-side declaration works around it.
    outputs:
      host:        ${{ steps.host.outputs.host }}
      instance:    ${{ steps.host.outputs.instance }}
      latest_host: ${{ steps.host.outputs.latest_host }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: consumer

      - name: Checkout airis-deploy-workflows (this repo, pinned)
        uses: actions/checkout@v4
        with:
          repository: winshare-tw/airis-deploy-workflows
          ref: ${{ env.AIRIS_DEPLOY_REF }}
          path: deploy-workflows

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install tooling (no-sudo, ~/.local/bin) — yq + buildctl
        shell: bash
        run: |
          set -e
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          curl -sSL -o "$HOME/.local/bin/yq" https://github.com/mikefarah/yq/releases/download/v4.42.1/yq_linux_amd64
          chmod +x "$HOME/.local/bin/yq"

          # buildctl talks to the in-cluster rootless buildkitd over gRPC.
          # No docker daemon needed on the runner side.
          curl -sSL https://github.com/moby/buildkit/releases/download/v0.13.2/buildkit-v0.13.2.linux-amd64.tar.gz \
            | tar -xz -C "$HOME/.local/bin" --strip-components=1 bin/buildctl
          "$HOME/.local/bin/buildctl" --version

      - name: Clone gitops repo
        env:
          GITOPS_SSH_KEY: ${{ secrets.GITOPS_SSH_KEY }}
        run: |
          set -e
          source deploy-workflows/scripts/lib.sh
          clone_gitops "$GITHUB_WORKSPACE/gitops"

      - id: host
        name: Generate sandbox host
        env:
          ZONE: ${{ inputs.zone }}
          AVOID_DIR: ${{ github.workspace }}/gitops/sandboxes/${{ inputs.app }}
        run: |
          set -e
          out=$(deploy-workflows/scripts/new-host.sh)
          eval "$out"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "instance=$INSTANCE" >> "$GITHUB_OUTPUT"
          if [ -n "${{ inputs.alias }}" ] && [ "${{ inputs.promote }}" = "true" ]; then
            echo "latest_host=${{ inputs.alias }}.${{ inputs.zone }}" >> "$GITHUB_OUTPUT"
          else
            echo "latest_host=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image (buildctl → in-cluster buildkitd)
        env:
          BUILDKIT_HOST: tcp://buildkitd.buildkit.svc.cluster.local:1234
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF:     ${{ inputs.image_registry }}/${{ inputs.app }}:${{ steps.host.outputs.instance }}
          CACHE_REF:     ${{ inputs.image_registry }}/${{ inputs.app }}:buildcache
        run: |
          set -euo pipefail

          # Registry auth: write a Docker-compatible config.json that buildctl reads
          # from $DOCKER_CONFIG (defaults to ~/.docker).
          mkdir -p "$HOME/.docker"
          AUTH=$(printf '%s:%s' "$GHCR_USERNAME" "$GHCR_TOKEN" | base64 -w0)
          cat > "$HOME/.docker/config.json" <<EOF
          {"auths":{"ghcr.io":{"auth":"$AUTH"}}}
          EOF

          buildctl build \
            --frontend dockerfile.v0 \
            --local context="$GITHUB_WORKSPACE/consumer/${{ inputs.context }}" \
            --local dockerfile="$GITHUB_WORKSPACE/consumer/${{ inputs.context }}" \
            --opt filename="${{ inputs.dockerfile }}" \
            --output "type=image,name=${IMAGE_REF},push=true" \
            --export-cache "type=registry,ref=${CACHE_REF},mode=max" \
            --import-cache "type=registry,ref=${CACHE_REF}"

          echo "pushed: $IMAGE_REF"

      - name: Render manifest into gitops worktree
        env:
          APP:            ${{ inputs.app }}
          INSTANCE:       ${{ steps.host.outputs.instance }}
          HOST:           ${{ steps.host.outputs.host }}
          PORT:           ${{ inputs.port }}
          HEALTH_PATH:    ${{ inputs.health_path }}
          ALIAS:          ${{ inputs.alias }}
          PROMOTE:        ${{ inputs.promote }}
          TTL:            ${{ inputs.ttl }}
          IMAGE_TAG:      ${{ steps.host.outputs.instance }}
          IMAGE_REGISTRY: ${{ inputs.image_registry }}
          RES_CPU:        ${{ inputs.resources_cpu }}
          RES_MEM:        ${{ inputs.resources_mem }}
          ENV_KV:         ${{ inputs.env_kv }}
          GITOPS_DIR:     ${{ github.workspace }}/gitops
        run: deploy-workflows/scripts/render.sh

      - name: Promote within gitops worktree (if requested)
        if: inputs.promote == true && inputs.alias != ''
        env:
          APP:             ${{ inputs.app }}
          TARGET_INSTANCE: ${{ steps.host.outputs.instance }}
          ALIAS:           ${{ inputs.alias }}
          GITOPS_DIR:      ${{ github.workspace }}/gitops
        run: deploy-workflows/scripts/promote.sh

      - name: Commit and push to gitops
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/gitops"
          git add sandboxes/${{ inputs.app }}/
          if git diff --staged --quiet; then
            echo "no manifest changes (sandbox already exists?)"; exit 1
          fi
          git commit -m "deploy(${{ inputs.app }}): ${{ steps.host.outputs.instance }} (promote=${{ inputs.promote }})"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::failed to push gitops repo after 3 retries"
          exit 1

      - name: Smoke test — poll sandbox URL until 2xx
        env:
          HOST: ${{ steps.host.outputs.host }}
        run: |
          set -e
          echo "Probing https://$HOST (Argo sync + pod startup; up to 6 min)..."
          for i in $(seq 1 72); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 5 "https://$HOST" || echo "000")
            case "$code" in
              2*|3*|404) echo "[$i/72] $code → alive"; exit 0 ;;
            esac
            echo "[$i/72] $code"
            sleep 5
          done
          echo "::error::sandbox $HOST did not return 2xx/3xx/404 within 6 minutes"
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deployed"
            echo "| | |"
            echo "|---|---|"
            echo "| Sandbox | https://${{ steps.host.outputs.host }} |"
            if [ -n "${{ steps.host.outputs.latest_host }}" ]; then
              echo "| Latest alias | https://${{ steps.host.outputs.latest_host }} |"
            fi
            echo "| Instance | \`${{ steps.host.outputs.instance }}\` |"
            echo "| Image | \`${{ inputs.image_registry }}/${{ inputs.app }}:${{ steps.host.outputs.instance }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
