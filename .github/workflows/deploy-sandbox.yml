name: deploy-sandbox

on:
  workflow_call:
    inputs:
      app:            { type: string,  required: true }
      dockerfile:     { type: string,  default: "Dockerfile" }
      context:        { type: string,  default: "." }
      port:           { type: number,  required: true }
      health_path:    { type: string,  default: "/" }
      alias:          { type: string,  default: "" }
      ttl:            { type: string,  default: "7d" }
      promote:        { type: boolean, default: true }
      resources_cpu:  { type: string,  default: "500m" }
      resources_mem:  { type: string,  default: "512Mi" }
      image_registry: { type: string,  default: "ghcr.io/winshare-tw" }
    outputs:
      host:        { description: "FQDN of the new sandbox", value: "${{ jobs.deploy.outputs.host }}" }
      instance:    { description: "Instance id (= image tag)", value: "${{ jobs.deploy.outputs.instance }}" }
      latest_host: { description: "alias.winshare.tw if promoted",  value: "${{ jobs.deploy.outputs.latest_host }}" }
    secrets:
      GITOPS_TOKEN:
        required: true

permissions:
  contents: read
  packages: write

env:
  AIRIS_DEPLOY_REF: v1

jobs:
  deploy:
    runs-on: arc-winshare-default
    timeout-minutes: 20
    outputs:
      host:        ${{ steps.host.outputs.host }}
      instance:    ${{ steps.host.outputs.instance }}
      latest_host: ${{ steps.host.outputs.latest_host }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: consumer

      - name: Checkout airis-deploy-workflows (this repo, pinned)
        uses: actions/checkout@v4
        with:
          repository: winshare-tw/airis-deploy-workflows
          ref: ${{ env.AIRIS_DEPLOY_REF }}
          path: deploy-workflows

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install tooling (no-sudo, ~/.local/bin)
        shell: bash
        run: |
          set -e
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -sSL -o "$HOME/.local/bin/yq" https://github.com/mikefarah/yq/releases/download/v4.42.1/yq_linux_amd64
          chmod +x "$HOME/.local/bin/yq"

      # NOTE: docker buildx requires a privileged/DinD ARC runner tier.
      # The default `arc-winshare-default` tier has no docker daemon, so this
      # job MUST run on a different runner label when image building is needed.
      # If you see "docker: command not found" or buildx connection errors,
      # ask the platform team to point this workflow at a DinD-enabled runner
      # (e.g. arc-winshare-build) by overriding `runs-on` from the caller, OR
      # swap docker/build-push-action for kaniko-based image building.
      - name: Verify docker buildx (DinD runner expected)
        run: docker buildx version

      - name: Clone gitops repo
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          set -e
          source deploy-workflows/scripts/lib.sh
          clone_gitops "$GITHUB_WORKSPACE/gitops"

      - id: host
        name: Generate sandbox host
        env:
          ZONE: winshare.tw
          AVOID_DIR: ${{ github.workspace }}/gitops/sandboxes/${{ inputs.app }}
        run: |
          set -e
          out=$(deploy-workflows/scripts/new-host.sh)
          eval "$out"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "instance=$INSTANCE" >> "$GITHUB_OUTPUT"
          if [ -n "${{ inputs.alias }}" ] && [ "${{ inputs.promote }}" = "true" ]; then
            echo "latest_host=${{ inputs.alias }}.winshare.tw" >> "$GITHUB_OUTPUT"
          else
            echo "latest_host=" >> "$GITHUB_OUTPUT"
          fi

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: consumer/${{ inputs.context }}
          file:    consumer/${{ inputs.context }}/${{ inputs.dockerfile }}
          push:    true
          tags:    ${{ inputs.image_registry }}/${{ inputs.app }}:${{ steps.host.outputs.instance }}
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to:   type=gha,mode=max,scope=${{ inputs.app }}

      - name: Render manifest into gitops worktree
        env:
          APP:            ${{ inputs.app }}
          INSTANCE:       ${{ steps.host.outputs.instance }}
          HOST:           ${{ steps.host.outputs.host }}
          PORT:           ${{ inputs.port }}
          HEALTH_PATH:    ${{ inputs.health_path }}
          ALIAS:          ${{ inputs.alias }}
          PROMOTE:        ${{ inputs.promote }}
          TTL:            ${{ inputs.ttl }}
          IMAGE_TAG:      ${{ steps.host.outputs.instance }}
          IMAGE_REGISTRY: ${{ inputs.image_registry }}
          RES_CPU:        ${{ inputs.resources_cpu }}
          RES_MEM:        ${{ inputs.resources_mem }}
          GITOPS_DIR:     ${{ github.workspace }}/gitops
        run: deploy-workflows/scripts/render.sh

      - name: Promote within gitops worktree (if requested)
        if: inputs.promote == true && inputs.alias != ''
        env:
          APP:             ${{ inputs.app }}
          TARGET_INSTANCE: ${{ steps.host.outputs.instance }}
          ALIAS:           ${{ inputs.alias }}
          GITOPS_DIR:      ${{ github.workspace }}/gitops
        run: deploy-workflows/scripts/promote.sh

      - name: Commit and push to gitops
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/gitops"
          git add sandboxes/${{ inputs.app }}/
          if git diff --staged --quiet; then
            echo "no manifest changes (sandbox already exists?)"; exit 1
          fi
          git commit -m "deploy(${{ inputs.app }}): ${{ steps.host.outputs.instance }} (promote=${{ inputs.promote }})"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::failed to push gitops repo after 3 retries"
          exit 1

      - name: Summary
        run: |
          {
            echo "host:        ${{ steps.host.outputs.host }}"
            echo "instance:    ${{ steps.host.outputs.instance }}"
            echo "latest_host: ${{ steps.host.outputs.latest_host }}"
          } >> "$GITHUB_STEP_SUMMARY"
