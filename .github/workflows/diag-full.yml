name: diag-full
on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
      port:
        type: number
        required: true
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      health_path:
        type: string
        default: "/"
      alias:
        type: string
        default: ""
      zone:
        type: string
        default: "winshare.tw"
      ttl:
        type: string
        default: "7d"
      promote:
        type: boolean
        default: true
      resources_cpu:
        type: string
        default: "500m"
      resources_mem:
        type: string
        default: "512Mi"
      image_registry:
        type: string
        default: "ghcr.io/winshare-tw"
    outputs:
      host:
        value: ${{ jobs.deploy.outputs.host }}
    secrets:
      GITOPS_SSH_KEY:
        required: false
jobs:
  deploy:
    runs-on: arc-winshare-default
    outputs:
      host: ${{ steps.h.outputs.host }}
    steps:
      - id: h
        run: echo "host=hello" >> "$GITHUB_OUTPUT"
