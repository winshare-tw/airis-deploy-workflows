name: diag-full
on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
      port:
        type: number
        required: true
    outputs:
      host:
        description: "FQDN"
        value: ${{ jobs.deploy.outputs.host }}
      instance:
        description: "tag"
        value: ${{ jobs.deploy.outputs.instance }}
      latest_host:
        description: "alias"
        value: ${{ jobs.deploy.outputs.latest_host }}
    secrets:
      GITOPS_SSH_KEY:
        required: false
jobs:
  deploy:
    runs-on: arc-winshare-default
    outputs:
      host:        ${{ steps.h.outputs.host }}
      instance:    ${{ steps.h.outputs.instance }}
      latest_host: ${{ steps.h.outputs.latest_host }}
    steps:
      - id: h
        run: |
          echo "host=hello.example.com" >> "$GITHUB_OUTPUT"
          echo "instance=hello" >> "$GITHUB_OUTPUT"
          echo "latest_host=" >> "$GITHUB_OUTPUT"
