name: self-test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: chart lint + render + bats
    runs-on: arc-winshare-default
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools (no-sudo, ~/.local/bin)
        shell: bash
        run: |
          set -e
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          curl -sSL -o "$HOME/.local/bin/yq" https://github.com/mikefarah/yq/releases/download/v4.42.1/yq_linux_amd64
          chmod +x "$HOME/.local/bin/yq"

          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C "$HOME/.local/bin" kubeconform

          git clone --depth 1 https://github.com/bats-core/bats-core /tmp/bats-core
          /tmp/bats-core/install.sh "$HOME/.local"

          python -m pip install --user --quiet yamllint==1.35.1

      - name: helm lint
        run: helm lint chart/airis-sandbox

      - name: bats — new-host / promote / destroy
        run: bats tests/bats/

      - name: render every fixture and kubeconform it
        run: |
          set -e
          for f in tests/render-cases/*.yaml; do
            case "$f" in *"/expected/"*) continue ;; esac
            name=$(basename "$f" .yaml)
            helm template chart/airis-sandbox -f "$f" > "/tmp/${name}.rendered.yaml"
            kubeconform -strict -summary "/tmp/${name}.rendered.yaml"
          done

      - name: golden render diff
        run: |
          set -e
          for f in tests/render-cases/*.yaml; do
            case "$f" in *"/expected/"*) continue ;; esac
            name=$(basename "$f" .yaml)
            helm template chart/airis-sandbox -f "$f" > "/tmp/${name}.rendered.yaml"
            diff -u "tests/render-cases/expected/${name}.yaml" "/tmp/${name}.rendered.yaml"
          done

      - name: yamllint workflows
        run: |
          yamllint -d '{extends: default, rules: {line-length: disable, comments: {min-spaces-from-content: 1}, comments-indentation: disable, document-start: disable, indentation: {indent-sequences: consistent}, truthy: disable, braces: {max-spaces-inside: 1}, colons: disable, commas: disable, empty-lines: disable, brackets: disable}}' .github/workflows
